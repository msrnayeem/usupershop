version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: usuper-shop-app
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      # Exclude node_modules and vendor from volume mounting to avoid host clashing, or keep them mounted if developing
    environment:
      - APP_ENV=local
      - APP_DEBUG=true

networks:
  default:
    external: true
    name: shared-network
