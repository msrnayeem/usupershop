version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: usuper-shop-app
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=local
      - APP_DEBUG=true

networks:
  default:
    external: true
    name: shared-network
